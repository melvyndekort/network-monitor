name: Deploy send-notifications

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/send_notifications/**'
      - '.github/workflows/send-notifications.yml'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-lambda.yml
    secrets: inherit
    with:
      function_name: network-monitor-send-notifications
      lambda_dir: lambdas/send_notifications
