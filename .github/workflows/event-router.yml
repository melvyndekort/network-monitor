name: Deploy event-router

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/event_router/**'
      - '.github/workflows/event-router.yml'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-lambda.yml
    secrets: inherit
    with:
      function_name: network-monitor-event-router
      lambda_dir: lambdas/event_router
