name: "Data Collector"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/data-collector.yml'
      - 'data-collector/**'
  pull_request:
    branches:
      - main
    paths:
      - 'data-collector/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: data-collector
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run tests
        run: uv run pytest --cov=data_collector --cov-report=xml
      - name: Run pylint
        run: uv run pylint data_collector
      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: data-collector/coverage.xml
          use_oidc: true
          verbose: true

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        uses: docker/build-push-action@v7
        with:
          context: data-collector
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/build-push-action@v7
        with:
          context: data-collector
          push: true
          tags: ghcr.io/melvyndekort/data-collector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
