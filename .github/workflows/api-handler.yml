name: Deploy api-handler

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/api_handler/**'
      - '.github/workflows/api-handler.yml'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy-lambda.yml
    secrets: inherit
    with:
      function_name: network-monitor-api-handler
      lambda_dir: lambdas/api_handler
