name: Deploy track-presence

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/track_presence/**'
      - '.github/workflows/track-presence.yml'
      - '.github/workflows/deploy-lambda.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-lambda.yml
    secrets: inherit
    with:
      function_name: network-monitor-track-presence
      lambda_dir: lambdas/track_presence
